<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TiFpiano2 🎹🌟</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif; }
body {
  background: linear-gradient(180deg, #72d9ff 0%, #89bbff 40%, #a77fff 100%);
  color: #203050;
  user-select: none;
  -webkit-user-select: none;
}

.scene {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.cloud {
  position: absolute;
  background: rgba(255,255,255,.9);
  border-radius: 999px;
  filter: drop-shadow(0 8px 10px rgba(0,0,0,.08));
}
.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: inherit;
  border-radius: inherit;
}
.cloud.c1 { width: 120px; height: 40px; top: 24px; left: 18px; }
.cloud.c1::before { width: 50px; height: 50px; left: 10px; top: -18px; }
.cloud.c1::after { width: 58px; height: 58px; right: 10px; top: -24px; }
.cloud.c2 { width: 110px; height: 36px; top: 54px; right: 18px; }
.cloud.c2::before { width: 42px; height: 42px; left: 14px; top: -16px; }
.cloud.c2::after { width: 50px; height: 50px; right: 12px; top: -20px; }

.topbar {
  position: relative;
  z-index: 4;
  padding: 14px 12px 8px;
  text-align: center;
}
.topbar h1 {
  color: white;
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  text-shadow: 0 4px 14px rgba(62, 46, 140, .3);
}
.topbar p {
  color: rgba(255,255,255,.95);
  margin-top: 4px;
  font-weight: 700;
  font-size: clamp(.9rem, 2.3vw, 1.05rem);
}

.controls {
  position: relative;
  z-index: 4;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  padding: 8px 12px 10px;
}
.btn {
  border: none;
  border-radius: 999px;
  padding: 11px 16px;
  font-weight: 900;
  cursor: pointer;
  color: #5e3d91;
  background: rgba(255,255,255,.9);
  box-shadow: 0 4px 12px rgba(0,0,0,.08);
}
.btn.primary { background: linear-gradient(135deg, #ffd86b, #ff9db5); color: white; }
.btn.active { background: linear-gradient(135deg, #ffbf4f, #ff7ca6); color: white; }

.status {
  position: relative;
  z-index: 4;
  display: flex;
  justify-content: center;
  padding: 0 12px 10px;
}
.status-card {
  background: rgba(255,255,255,.82);
  border: 3px solid rgba(255,255,255,.55);
  box-shadow: 0 10px 24px rgba(66, 50, 134, .14);
  border-radius: 24px;
  padding: 12px 16px;
  min-width: min(760px, calc(100vw - 24px));
  max-width: 900px;
}
.song-title {
  font-weight: 900;
  color: #4a3b91;
  font-size: clamp(1rem, 2.2vw, 1.2rem);
}
.hint {
  color: #38506d;
  font-weight: 700;
  margin-top: 6px;
  min-height: 1.4em;
}
.progress {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 10px;
}
.pill {
  min-width: 38px;
  height: 38px;
  border-radius: 999px;
  padding: 0 10px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  background: #edf4ff;
  border: 2px solid #d8e8ff;
  color: #5242a0;
  transition: all .16s ease;
}
.pill.done { background: #99e68c; border-color: #59c767; color: #205d2f; }
.pill.current { background: #ffe28d; border-color: #ffbf47; transform: scale(1.08); box-shadow: 0 0 0 5px rgba(255,191,71,.18); }
.pill.miss { background: #ffb8b8; border-color: #ff7a7a; }

.playfield {
  position: relative;
  flex: 1;
  margin: 0 auto;
  width: min(980px, calc(100vw - 12px));
  min-height: 0;
  display: flex;
  flex-direction: column;
}

.note-area {
  position: relative;
  flex: 1;
  margin: 0 4px;
  border-radius: 28px 28px 18px 18px;
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.02)),
    linear-gradient(180deg, rgba(82, 72, 178, .12), rgba(94, 178, 255, .08));
  box-shadow: inset 0 -12px 24px rgba(255,255,255,.08);
}
.lanes {
  position: absolute;
  inset: 0;
  display: flex;
  gap: 6px;
  padding: 0 10px;
}
.lane {
  flex: 1;
  position: relative;
  background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.02));
  border-left: 1px solid rgba(255,255,255,.2);
  border-right: 1px solid rgba(255,255,255,.14);
}
.target-line {
  position: absolute;
  left: 10px;
  right: 10px;
  bottom: 12px;
  height: 10px;
  border-radius: 999px;
  background: rgba(255,255,255,.55);
  box-shadow: 0 0 18px rgba(255,255,255,.5);
}
.falling-note {
  position: absolute;
  width: calc(100% - 10px);
  left: 5px;
  height: 46px;
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  color: white;
  text-shadow: 0 1px 2px rgba(0,0,0,.2);
  box-shadow: 0 10px 18px rgba(0,0,0,.15), inset 0 4px 10px rgba(255,255,255,.18);
}
.falling-note.hit { transform: scale(1.08); }
.falling-note.missed { filter: grayscale(.2) brightness(.8); opacity: .55; }

.piano-shell {
  position: relative;
  z-index: 3;
  margin-top: -8px;
  background: linear-gradient(180deg, #ff74ac 0%, #ff8d55 100%);
  border-radius: 30px 30px 0 0;
  padding: 14px 12px 14px;
  border: 6px solid rgba(255,255,255,.28);
  box-shadow: 0 -8px 18px rgba(58, 44, 124, .14), 0 16px 36px rgba(58, 44, 124, .22);
}
.brand-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  color: white;
  font-weight: 900;
  margin-bottom: 12px;
}
.brand-left { font-size: clamp(1rem, 2.4vw, 1.25rem); }
.brand-right { font-size: clamp(.82rem, 1.9vw, .95rem); opacity: .95; }
.keyboard {
  position: relative;
  display: flex;
  gap: 6px;
  height: min(27vh, 210px);
}
.key {
  flex: 1;
  position: relative;
  border-radius: 0 0 24px 24px;
  border: 3px solid rgba(255,255,255,.36);
  box-shadow: inset 0 -12px 0 rgba(0,0,0,.08), 0 8px 0 rgba(0,0,0,.08);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding: 12px 6px;
  cursor: pointer;
  transition: transform .06s ease, filter .15s ease, box-shadow .15s ease;
  color: white;
}
.key.black {
  height: 62%;
  flex: .62;
  margin: 0 -2.4%;
  z-index: 5;
  align-self: flex-start;
  border-radius: 0 0 18px 18px;
}
.key.active-window {
  box-shadow: inset 0 -12px 0 rgba(0,0,0,.08), 0 0 0 6px rgba(255,255,255,.22), 0 0 24px rgba(255,255,255,.5), 0 10px 0 rgba(0,0,0,.08);
  filter: brightness(1.1);
}
.key.pressed { transform: translateY(4px) scaleY(.985); }
.key-label { font-weight: 900; font-size: clamp(.72rem, 1.8vw, .95rem); text-shadow: 0 1px 2px rgba(0,0,0,.25); }
.key-icon { font-size: clamp(1.15rem, 3vw, 1.8rem); margin-bottom: 8px; }
.key-gloss {
  position: absolute;
  left: 10px; right: 10px; top: 10px; height: 22%;
  border-radius: 18px;
  background: linear-gradient(180deg, rgba(255,255,255,.38), transparent);
}

.spark {
  position: fixed;
  pointer-events: none;
  z-index: 30;
  font-size: 1.4rem;
  animation: fly 850ms ease-out forwards;
}
@keyframes fly {
  0% { opacity: 1; transform: translateY(0) scale(.8) rotate(0deg); }
  100% { opacity: 0; transform: translateY(-78px) scale(1.4) rotate(16deg); }
}

@media (max-width: 760px) {
  .controls { gap: 8px; }
  .btn { padding: 10px 14px; font-size: .92rem; }
  .status-card { min-width: 0; width: 100%; }
  .playfield { width: calc(100vw - 8px); }
  .note-area { border-radius: 22px 22px 14px 14px; }
  .keyboard { height: min(25vh, 180px); gap: 4px; }
  .key.black { margin: 0 -3%; }
}
</style>
</head>
<body>
<div class="scene">
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>

  <div class="topbar">
    <h1>🎹 TiFpiano2</h1>
    <p>Falling notes • glowing keys • Twinkle first</p>
  </div>

  <div class="controls">
    <button class="btn active" id="mode-song" onclick="setMode('song')">🌟 Learn Song</button>
    <button class="btn" id="mode-free" onclick="setMode('free')">🎵 Free Play</button>
    <button class="btn primary" onclick="startSong()">▶️ Start</button>
    <button class="btn" onclick="stopSong()">⏹️ Stop</button>
    <button class="btn" onclick="toggleAuto()" id="autoBtn">🤖 Auto: Off</button>
  </div>

  <div class="status">
    <div class="status-card">
      <div class="song-title" id="songTitle">🌟 Twinkle Twinkle Little Star</div>
      <div class="hint" id="hint">Notes fall from above. When one reaches the line, press that key.</div>
      <div class="progress" id="progress"></div>
    </div>
  </div>

  <div class="playfield">
    <div class="note-area" id="noteArea">
      <div class="lanes" id="lanes"></div>
      <div class="target-line"></div>
    </div>

    <div class="piano-shell">
      <div class="brand-row">
        <div class="brand-left">✨ Rainbow Piano ✨</div>
        <div class="brand-right">A S D F G H J K keys work too</div>
      </div>
      <div class="keyboard" id="keyboard"></div>
    </div>
  </div>
</div>

<script>
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

const NOTES = [
  { name: 'C', label: 'Do', freq: 261.63, color: '#ff5f8e', icon: '🐻', type: 'white' },
  { name: 'C#', label: 'Do#', freq: 277.18, color: '#895dff', icon: '⭐', type: 'black' },
  { name: 'D', label: 'Re', freq: 293.66, color: '#ff9648', icon: '🦊', type: 'white' },
  { name: 'D#', label: 'Re#', freq: 311.13, color: '#5677ff', icon: '☁️', type: 'black' },
  { name: 'E', label: 'Mi', freq: 329.63, color: '#ffd24c', icon: '🐥', type: 'white' },
  { name: 'F', label: 'Fa', freq: 349.23, color: '#5ed86a', icon: '🐸', type: 'white' },
  { name: 'F#', label: 'Fa#', freq: 369.99, color: '#1fc7c8', icon: '💧', type: 'black' },
  { name: 'G', label: 'Sol', freq: 392.00, color: '#45b7ff', icon: '🐳', type: 'white' },
  { name: 'G#', label: 'Sol#', freq: 415.30, color: '#4868ff', icon: '🌙', type: 'black' },
  { name: 'A', label: 'La', freq: 440.00, color: '#9f6dff', icon: '🦄', type: 'white' },
  { name: 'A#', label: 'La#', freq: 466.16, color: '#d04dff', icon: '✨', type: 'black' },
  { name: 'B', label: 'Si', freq: 493.88, color: '#ff66b3', icon: '🦋', type: 'white' },
  { name: 'C2', label: 'Do2', freq: 523.25, color: '#ff7a5b', icon: '🌈', type: 'white' }
];

const SONG = {
  name: 'Twinkle Twinkle Little Star',
  notes: [0,0,7,7,9,9,7, 5,5,4,4,2,2,0],
};

let mode = 'song';
let autoPlay = false;
let songRunning = false;
let activeNotes = [];
let songTimers = [];
let spawnIndex = 0;
let progressIndex = 0;
let missFlash = false;
const noteDuration = 3600;
const targetWindowPx = 54;
let lastFrame = 0;

function shade(hex, amt) {
  const n = parseInt(hex.slice(1), 16);
  let r = (n >> 16) + amt;
  let g = ((n >> 8) & 255) + amt;
  let b = (n & 255) + amt;
  r = Math.max(0, Math.min(255, r));
  g = Math.max(0, Math.min(255, g));
  b = Math.max(0, Math.min(255, b));
  return `#${(r << 16 | g << 8 | b).toString(16).padStart(6, '0')}`;
}

function buildLanes() {
  const lanes = document.getElementById('lanes');
  lanes.innerHTML = '';
  NOTES.forEach(() => {
    const lane = document.createElement('div');
    lane.className = 'lane';
    lanes.appendChild(lane);
  });
}

function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  NOTES.forEach((note, index) => {
    const key = document.createElement('button');
    key.className = `key ${note.type}`;
    key.dataset.index = index;
    key.style.background = `linear-gradient(180deg, ${shade(note.color, 18)}, ${note.color} 70%, ${shade(note.color, -18)})`;
    key.innerHTML = `<div class="key-gloss"></div><div class="key-icon">${note.icon}</div><div class="key-label">${note.label}</div>`;
    key.addEventListener('pointerdown', e => { e.preventDefault(); handleInput(index); });
    key.addEventListener('touchstart', e => { e.preventDefault(); handleInput(index); }, { passive: false });
    kb.appendChild(key);
  });
}

function renderProgress() {
  const progress = document.getElementById('progress');
  progress.innerHTML = '';
  SONG.notes.forEach((noteIndex, idx) => {
    const pill = document.createElement('div');
    pill.className = 'pill';
    if (idx < progressIndex) pill.classList.add('done');
    if (idx === progressIndex) pill.classList.add('current');
    if (missFlash && idx === progressIndex) pill.classList.add('miss');
    pill.textContent = NOTES[noteIndex].label;
    progress.appendChild(pill);
  });
}

function setMode(next) {
  mode = next;
  document.getElementById('mode-song').classList.toggle('active', next === 'song');
  document.getElementById('mode-free').classList.toggle('active', next === 'free');
  stopSong();
  if (next === 'free') {
    document.getElementById('hint').textContent = 'Free play mode. Tap any key.';
  } else {
    document.getElementById('hint').textContent = 'Notes fall from above. When one reaches the line, press that key.';
  }
}

function toggleAuto() {
  autoPlay = !autoPlay;
  document.getElementById('autoBtn').textContent = `🤖 Auto: ${autoPlay ? 'On' : 'Off'}`;
}

function startSong() {
  if (mode !== 'song') {
    setMode('song');
  }
  stopSong();
  songRunning = true;
  spawnIndex = 0;
  progressIndex = 0;
  renderProgress();
  document.getElementById('hint').textContent = 'Go. Hit each key when the falling note reaches the line.';

  SONG.notes.forEach((noteIndex, idx) => {
    const timer = setTimeout(() => spawnNote(noteIndex, idx), idx * 900);
    songTimers.push(timer);
  });
}

function stopSong() {
  songRunning = false;
  songTimers.forEach(clearTimeout);
  songTimers = [];
  activeNotes.forEach(n => n.el.remove());
  activeNotes = [];
  clearKeyHighlights();
}

function spawnNote(noteIndex, sequenceIndex) {
  if (!songRunning) return;
  const lanes = document.querySelectorAll('.lane');
  const lane = lanes[noteIndex];
  if (!lane) return;
  const note = NOTES[noteIndex];
  const el = document.createElement('div');
  el.className = 'falling-note';
  el.style.background = `linear-gradient(180deg, ${shade(note.color, 14)}, ${note.color})`;
  el.innerHTML = `${note.icon} ${note.label}`;
  lane.appendChild(el);

  const obj = {
    noteIndex,
    sequenceIndex,
    lane,
    el,
    start: performance.now(),
    hit: false,
    missed: false,
  };
  activeNotes.push(obj);
}

function handleInput(noteIndex) {
  playTone(NOTES[noteIndex].freq);
  flashKey(noteIndex, true);

  if (mode === 'free') return;

  const candidate = activeNotes.find(n => !n.hit && !n.missed && n.noteIndex === noteIndex && inHitWindow(n));
  if (candidate) {
    candidate.hit = true;
    candidate.el.classList.add('hit');
    candidate.el.style.opacity = '0';
    setTimeout(() => candidate.el.remove(), 140);
    activeNotes = activeNotes.filter(n => n !== candidate);
    if (candidate.sequenceIndex === progressIndex) {
      progressIndex += 1;
      renderProgress();
      document.getElementById('hint').textContent = progressIndex >= SONG.notes.length
        ? 'Nice. Song finished.'
        : `Good. Next: ${NOTES[SONG.notes[progressIndex]].label}`;
      if (progressIndex >= SONG.notes.length) {
        celebrate();
        songRunning = false;
      }
    }
  } else if (songRunning) {
    showMiss();
  }
}

function inHitWindow(noteObj) {
  const laneRect = noteObj.lane.getBoundingClientRect();
  const noteRect = noteObj.el.getBoundingClientRect();
  const targetY = laneRect.bottom - 35;
  const noteCenter = noteRect.top + noteRect.height / 2;
  return Math.abs(noteCenter - targetY) <= targetWindowPx;
}

function flashKey(index, pressed = false) {
  const key = document.querySelector(`.key[data-index="${index}"]`);
  if (!key) return;
  key.classList.add('pressed');
  if (pressed) spawnSpark(key, NOTES[index].icon, NOTES[index].color);
  setTimeout(() => key.classList.remove('pressed'), 110);
}

function clearKeyHighlights() {
  document.querySelectorAll('.key').forEach(k => k.classList.remove('active-window'));
}

function showMiss() {
  missFlash = true;
  renderProgress();
  document.getElementById('hint').textContent = 'Too early or wrong key. Wait for the note to reach the line.';
  setTimeout(() => {
    missFlash = false;
    renderProgress();
  }, 220);
}

function celebrate() {
  for (let i = 0; i < 16; i++) {
    setTimeout(() => {
      const s = document.createElement('div');
      s.className = 'spark';
      s.textContent = ['✨','🌟','🎉','🎵'][Math.floor(Math.random() * 4)];
      s.style.left = `${Math.random() * window.innerWidth}px`;
      s.style.top = `${window.innerHeight * 0.45 + Math.random() * 80}px`;
      s.style.color = ['#ffd84d','#ff7ea6','#7fe1ff','#9ce68e'][Math.floor(Math.random() * 4)];
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 850);
    }, i * 60);
  }
}

function spawnSpark(sourceEl, icon, color) {
  const rect = sourceEl.getBoundingClientRect();
  const s = document.createElement('div');
  s.className = 'spark';
  s.textContent = icon;
  s.style.left = `${rect.left + rect.width / 2 - 8}px`;
  s.style.top = `${rect.top + 10}px`;
  s.style.color = color;
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 850);
}

function playTone(freq, duration = .42) {
  ensureAudio();
  const now = audioCtx.currentTime;
  const o1 = audioCtx.createOscillator();
  const o2 = audioCtx.createOscillator();
  const g1 = audioCtx.createGain();
  const g2 = audioCtx.createGain();
  o1.type = 'triangle';
  o1.frequency.setValueAtTime(freq, now);
  g1.gain.setValueAtTime(.0001, now);
  g1.gain.exponentialRampToValueAtTime(.23, now + .02);
  g1.gain.exponentialRampToValueAtTime(.0001, now + duration);
  o2.type = 'sine';
  o2.frequency.setValueAtTime(freq * 2, now);
  g2.gain.setValueAtTime(.11, now);
  g2.gain.exponentialRampToValueAtTime(.0001, now + duration * .65);
  o1.connect(g1).connect(audioCtx.destination);
  o2.connect(g2).connect(audioCtx.destination);
  o1.start(now); o2.start(now);
  o1.stop(now + duration + .05); o2.stop(now + duration + .05);
}

function animate(ts) {
  if (!lastFrame) lastFrame = ts;
  clearKeyHighlights();
  const lanes = document.querySelectorAll('.lane');

  activeNotes = activeNotes.filter(noteObj => {
    const laneRect = noteObj.lane.getBoundingClientRect();
    const areaRect = document.getElementById('noteArea').getBoundingClientRect();
    const progress = Math.min(1, (ts - noteObj.start) / noteDuration);
    const top = progress * (areaRect.height - 70);
    noteObj.el.style.top = `${top}px`;

    const targetY = laneRect.height - 35;
    const noteCenter = top + 23;
    if (Math.abs(noteCenter - targetY) <= targetWindowPx) {
      const key = document.querySelector(`.key[data-index="${noteObj.noteIndex}"]`);
      if (key) key.classList.add('active-window');
      if (autoPlay && !noteObj.hit && noteObj.sequenceIndex === progressIndex && Math.abs(noteCenter - targetY) <= 10) {
        handleInput(noteObj.noteIndex);
      }
    }

    if (progress >= 1 && !noteObj.hit) {
      noteObj.missed = true;
      noteObj.el.classList.add('missed');
      noteObj.el.remove();
      if (noteObj.sequenceIndex === progressIndex && songRunning) {
        showMiss();
      }
      return false;
    }
    return true;
  });

  requestAnimationFrame(animate);
}

const KEY_MAP = { a:0, w:1, s:2, e:3, d:4, f:5, t:6, g:7, y:8, h:9, u:10, j:11, k:12 };
document.addEventListener('keydown', e => {
  if (e.repeat) return;
  const idx = KEY_MAP[e.key.toLowerCase()];
  if (idx !== undefined) handleInput(idx);
  if (e.code === 'Space') {
    e.preventDefault();
    songRunning ? stopSong() : startSong();
  }
});

buildLanes();
buildKeyboard();
renderProgress();
requestAnimationFrame(animate);
</script>
</body>
</html>
